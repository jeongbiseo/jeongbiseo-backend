name: EC2 배포

# main push 시 자동 배포. workflow_dispatch는 수동 재배포/롤백용 escape hatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_IMAGE_NAME: kwonseok02/jeongbiseo
  EC2_SSH_USER: ubuntu

jobs:
  build-and-push-to-docker-hub:
    name: Docker 이미지 빌드 후 Docker Hub 푸시
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설치
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: gradlew 실행 권한 부여
        run: chmod +x ./gradlew

      - name: bootJar 빌드(테스트 제외 — 품질 게이트는 ci.yml 담당)
        run: ./gradlew clean bootJar -x test --no-daemon

      - name: Docker Buildx 설정
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 및 푸시(latest + SHA 태그)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE_NAME }}:latest
            ${{ env.DOCKER_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-to-ec2:
    name: EC2에 배포
    needs: build-and-push-to-docker-hub
    runs-on: ubuntu-latest
    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: docker-compose.yml을 EC2로 전송
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ env.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu"

      - name: EC2 SSH 접속 후 배포
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ env.EC2_SSH_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          script: |
            cd /home/ubuntu

            # 1. .env 생성(GitHub Secrets ENV 통째 주입)
            cat > .env <<'EOF'
            ${{ secrets.ENV }}
            EOF

            # 2. Docker Hub 로그인(private 리포 대비)
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            # 3. 최신 이미지 pull 후 재기동(mysql healthy 대기 후 app)
            docker compose pull
            docker compose up -d

            # 4. 미사용 이미지 정리 + 상태 출력
            docker image prune -f
            docker compose ps
