# EC2 배포용 compose. app + mysql만 둠(redis 미사용).
# name을 박아 프로젝트/볼륨/네트워크를 분리함 — 같은 EC2의 다른 앱(멋사) 볼륨과 절대 안 섞이게 함.
name: jeongbiseo

services:
  mysql:
    image: mysql:8.0
    container_name: jeongbiseo-mysql
    # 복제 없는 단일 데모라 binlog 불필요 — 대량 적재 시 binlog 부대용량(디스크)을 없앰
    command: ["--skip-log-bin"]
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: jeongbiseo
    volumes:
      - jeongbiseo_mysql_data:/var/lib/mysql
    # 3306은 호스트로 노출하지 않음(app이 compose 네트워크로만 접속)
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 5s
      timeout: 3s
      start_period: 40s
      retries: 12
    # 컨테이너 로그 무제한 증가로 디스크가 차는 것을 방지
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    networks:
      - jeongbiseo-network

  app:
    image: ${DOCKERHUB_USERNAME}/jeongbiseo:latest
    container_name: jeongbiseo-app
    ports:
      - "8080:8080"
    env_file:
      - .env
    # 2026-07-22 힙 OOM 장애 대응(리서치 문서 6.2절). t3.micro 1GiB에서 기본 최대 힙이 25%(약 227MB)뿐이라
    # 명시함. ExitOnOutOfMemoryError는 OOM 시 좀비(Acceptor 스레드만 죽고 프로세스는 생존) 대신 즉시 종료해
    # restart 정책이 재기동하게 함. 힙 덤프는 사후 분석용(호스트 볼륨에 남김). 파일명 고정이라 첫 크래시
    # 덤프만 보존됨 — 디스크(8GB) 보호를 위한 의도임.
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Xms128m
        -Xmx384m
        -XX:+ExitOnOutOfMemoryError
        -XX:+HeapDumpOnOutOfMemoryError
        -XX:HeapDumpPath=/var/log/jeongbiseo/heap.hprof
    volumes:
      - jeongbiseo_heapdump:/var/log/jeongbiseo
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - jeongbiseo-network

volumes:
  jeongbiseo_mysql_data:
  jeongbiseo_heapdump:

networks:
  jeongbiseo-network:
