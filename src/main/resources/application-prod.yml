server:
  # Nginx가 TLS를 종료하고 앱에는 http로 넘기므로, X-Forwarded-* 헤더를 반영해야 자기 주소를 https로 인식함.
  # 없으면 springdoc이 /v3/api-docs의 servers를 http로 적고, https로 열린 Swagger UI에서 Try it out이
  # mixed content로 브라우저에 차단됨. 로컬은 프록시가 없어 헤더 위조 여지가 생기므로 prod 프로필에만 둠.
  forward-headers-strategy: framework

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      # ponytail: 해커톤 데모 한정 예외. Flyway 미도입이라 첫 기동에 스키마 자동 생성이 필요함.
      # application-local.yml 주석의 "운영 프로필엔 validate/none" 원칙에 대한 의도적 예외임.
      # 스키마 공유나 데이터 보존이 필요해지면 그때 Flyway 도입 후 validate로 되돌림.
      ddl-auto: ${DDL_AUTO:update}
    properties:
      hibernate:
        format_sql: false

app:
  ingestion:
    # 기본 꺼둠. 데모 실데이터는 INGESTION_ENABLED=true + 키 2종으로 켬(기동 시 1회 적재 러너가 돎).
    enabled: ${INGESTION_ENABLED:false}
    gov24:
      service-key: ${ODCLOUD_SERVICE_KEY:}
      page-size: 1000
      max-pages: 50
    youthcenter:
      api-key: ${YOUTHCENTER_API_KEY:}
      page-size: 500
      max-pages: 50

  # 프로덕션은 base application.yml의 로컬 개발용 더미 기본값을 blank로 덮어써, JWT_SECRET을 실제로
  # 넣지 않으면 JwtProvider가 부팅 시 즉시 실패하게 강제함(설계 D10, "부팅 시 발견").
  jwt:
    secret: ${JWT_SECRET:}

  # 리프레시 토큰 쿠키 SameSite 속성임. 프론트와 백엔드 도메인이 갈리는 크로스 사이트 전송을 지원하려 기본 None으로 둠.
  auth:
    cookie:
      same-site: ${COOKIE_SAME_SITE:None}

  # CORS 허용 origin(콤마 구분)임. allowCredentials=true라 와일드카드를 못 써서 명시하며, 비면 아무 origin도 허용 안 함.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:}

  kakao:
    client:
      id: ${KAKAO_CLIENT_ID:}
      secret: ${KAKAO_CLIENT_SECRET:}

  google:
    client:
      id: ${GOOGLE_CLIENT_ID:}
      secret: ${GOOGLE_CLIENT_SECRET:}
